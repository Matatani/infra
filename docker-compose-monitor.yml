services:
  prometheus:
    image: prom/prometheus
    container_name: matatani-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: matatani-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    external: true
